# --- Channel (WEB | API | MOBILE) — also: -Dautomation.channel=API ---
automation.channel=WEB

# --- Web E2E ---
url=https://www.google.com
wait=10
browser=chrome
browser.headless=false
browser.acceptInsecureCerts=true

# --- API E2E ---
api.baseUri=https://jsonplaceholder.typicode.com
# Optional: api.authHeaderName=Authorization
# Optional: api.authHeaderValue=Bearer your-token

# --- Mobile E2E (Appium) ---
mobile.hubUrl=http://127.0.0.1:4723/
mobile.platform=android
mobile.deviceName=Android Emulator
# mobile.platformVersion=14
# mobile.app=/absolute/path/to/app.apk
# mobile.appPackage=com.example.app
# mobile.appActivity=.MainActivity
# iOS: mobile.bundleId=com.example.app
